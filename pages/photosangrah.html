<style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    h1 {
      background: brown;
      color: white;
      text-align: center;
      padding: 1rem;
      margin: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    .gallery-item {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .gallery-item:hover {
      transform: scale(1.03);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    .caption {
      padding: 10px;
      text-align: center;
      font-size: 0.95rem;
      background-color: floralwhite;
    }

    /* Lightbox styles */
    #lightbox {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 80%;
    }

    .lightbox-caption {
      color: #fff;
      font-size: 1rem;
      margin-top: 10px;
      text-align: center;
    }

    .close, .nav {
      position: absolute;
      color: white;
      font-size: 2rem;
      padding: 15px;
      cursor: pointer;
      user-select: none;
    }

    .close {
      top: 10px;
      right: 20px;
    }

    .nav.prev {
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    .nav.next {
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }

    @media (max-width: 600px) {
      .caption {
        font-size: 0.85rem;
      }

      .close, .nav {
        font-size: 1.5rem;
      }
    }
  </style>

<body>

<!-- <h1>फोटो संग्रह</h1> -->

 <div class="container-heading" oncontextmenu="return false;">
        <h1> फोटो संग्रह   </h1>
 <div class="chapter-content" oncontextmenu="return false;"> 

<div class="gallery-grid" id="gallery">
  <!-- JavaScript will populate this -->
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
  <span class="close" onclick="closeLightbox(event)">&times;</span>
  <span class="nav prev" onclick="prevImage(event)">&#10094;</span>
  <img id="lightbox-img" src="" alt="Fullscreen Photo" />
  <div class="lightbox-caption" id="lightbox-caption"></div>
  <span class="nav next" onclick="nextImage(event)">&#10095;</span>
</div>

<script>
  const totalImages = 52; // Number of images
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const lightboxCaption = document.getElementById('lightbox-caption');
  let currentIndex = 0;

  const captions = Array.from({ length: totalImages }, (_, i) =>
    `अध्याय क्रमांक ${i + 1}` // You can customize these per image
  );

  // Generate gallery
  for (let i = 0; i < totalImages; i++) {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.innerHTML = `
      <img src="../images/mulgurucharitra/Photo-${i}.webp" alt="फोटो ${i + 1}" loading="lazy" data-index="${i}" />
      <div class="caption">${captions[i]}</div>
    `;
    gallery.appendChild(item);
  }

  gallery.addEventListener('click', e => {
    if (e.target.tagName === 'IMG') {
      currentIndex = parseInt(e.target.dataset.index);
      openLightbox();
    }
  });

  function openLightbox() {
    lightboxImg.src = `../images/mulgurucharitra/Photo-${currentIndex}.webp`;
    lightboxCaption.textContent = captions[currentIndex];
    lightbox.style.display = 'flex';
  }

  function closeLightbox(e) {
    if (e.target === lightbox || e.target.classList.contains('close')) {
      lightbox.style.display = 'none';
    }
  }

  function prevImage(e) {
    e.stopPropagation();
    currentIndex = (currentIndex - 1 + totalImages) % totalImages;
    openLightbox();
  }

  function nextImage(e) {
    e.stopPropagation();
    currentIndex = (currentIndex + 1) % totalImages;
    openLightbox();
  }

  document.addEventListener('keydown', e => {
    if (lightbox.style.display === 'flex') {
      if (e.key === 'ArrowLeft') prevImage(e);
      if (e.key === 'ArrowRight') nextImage(e);
      if (e.key === 'Escape') lightbox.style.display = 'none';
    }
  });
</script>
